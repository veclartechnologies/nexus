<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Veclar HRMS</title>
<meta name="description" content="Veclar Technologies HRMS — attendance, requests, payroll and recruitment for our Sales, Support, Graphics, Leads, Developer and HR teams." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
<!-- SheetJS for ZKTeco K50 .xls/.xlsx parsing -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Re-usable V logo SVG (filled, blocky V matching brand mark) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="vLogo" viewBox="0 0 200 260">
      <!-- Filled chunky V, slight serif top-left, angled top-right, sharp bottom -->
      <path class="v-shape" fill="#d6a62a" d="
        M 6 8
        L 70 8
        L 70 22
        L 60 22
        L 100 200
        L 150 22
        L 140 22
        L 140 8
        L 196 8
        L 116 250
        L 86 250
        Z" />
    </symbol>
  </defs>
</svg>

<div id="stage" class="stage">

  <!-- App shell -->
  <section id="app" aria-hidden="true">
    <header class="topbar">
      <div class="logo">
        <span class="mark">VECLAR</span>
        <span class="sep"></span>
        <span class="panel" id="panelName">HRMS</span>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="globalSearch" placeholder="Search…" />
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="notifBtn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
          <span class="dot" id="notifDot" style="display:none"></span>
        </button>
        <button class="icon-btn" id="logoutBtn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
        <div class="avatar" id="avatar" title="Profile">A</div>
      </div>
    </header>

    <main class="main">
      <div id="view-home" class="view"></div>
      <div id="view-attendance" class="view"></div>
      <div id="view-requests" class="view"></div>
      <div id="view-payroll" class="view"></div>
      <div id="view-profile" class="view"></div>
      <div id="view-dashboard" class="view"></div>
      <div id="view-people" class="view"></div>
      <div id="view-admin-attendance" class="view"></div>
      <div id="view-admin-requests" class="view"></div>
      <div id="view-admin-payroll" class="view"></div>
      
      <div id="view-reports" class="view"></div>
      <div id="view-settings" class="view"></div>
    </main>

    <nav class="bottomnav" id="bottomnav"></nav>
  </section>

  <!-- Doors with split V halves -->
  <div class="door left">
    <div class="grain"></div>
    <div class="logo-half left-half"><svg><use href="#vLogo"/></svg></div>
  </div>
  <div class="door right">
    <div class="grain"></div>
    <div class="logo-half right-half"><svg><use href="#vLogo"/></svg></div>
  </div>
  <div class="impact" id="impact"></div>

  <!-- Login -->
  <section id="loginScreen" aria-hidden="true">
    <form class="login-card" id="loginForm" autocomplete="off">
      <div class="brand">
        <div class="logo-mark">VECLAR HRMS</div>
        <div class="tag">People · Performance · Payroll</div>
      </div>

      <div class="login-tabs" role="tablist" style="display:flex;gap:6px;background:#0a0a0c;padding:4px;border-radius:10px;border:1px solid var(--line);margin-bottom:18px">
        <button type="button" id="tabEmp" class="tab-btn active" data-role="employee" style="flex:1;padding:10px;border-radius:8px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:#0a0a0a;background:linear-gradient(180deg,var(--gold-soft),var(--gold))">Employee</button>
        <button type="button" id="tabAdm" class="tab-btn" data-role="admin" style="flex:1;padding:10px;border-radius:8px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:#aaa;background:transparent">Admin</button>
      </div>
      <input type="hidden" id="loginRole" value="employee"/>
      <div class="field">
        <label>Username</label>
        <input id="u" type="text" placeholder="" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="p" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="gold-btn" type="submit" id="signin">Sign In</button>
      <div class="row-meta">
       <span>v1.021</span> 
        <a href="#" id="forgotLink">Forgot password?</a>
      </div>
      <div class="err" id="err">Invalid credentials. Please try again.</div>
      <div class="hint" id="loginHint">Developed by Faraz Shahzad</div>
    </form>
  </section>

  <!-- Validation (breathing V) -->
  <section id="validate" aria-hidden="true">
    <div class="v-wrap">
      <svg viewBox="0 0 200 260"><use href="#vLogo"/></svg>
      <div class="v-status" id="vStatus">Verifying credentials…</div>
    </div>
  </section>

  <div class="modal" id="modal"><div class="box" id="modalBox"></div></div>
  <div id="toast"></div>
</div>

  <script src="script.js"></script>
</body>
</html>
