<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Veclar HRMS — People. Performance. Payroll.</title>
<meta name="description" content="Veclar Technologies HRMS — attendance, requests, payroll and recruitment for our Sales, Support, Graphics, Leads, Developer and HR teams." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
<!-- SheetJS for ZKTeco K50 .xls/.xlsx parsing -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<style>

:root{
  --gold:#d6a62a; --gold-soft:#e6bd4a; --gold-dim:#8a6a17;
  --black:#000; --white:#fff;
  --s0:#070707; --s1:#0f0f10; --s2:#17171a; --s3:#222226;
  --line:#2a2a30; --line-2:#3a3a44;
  --ok:#7adf8a; --warn:#f5c451; --danger:#ff4d4f; --info:#7ab7ff;
  --ease-h:cubic-bezier(.86,.02,.16,1);
  --ease-s:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--white)}
::selection{background:var(--gold);color:#000}
a{color:var(--gold);text-decoration:none}
.hidden{display:none!important}

/* Theme-matching scrollbars (global) */
*{scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold-dim),#5a4610);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--gold),var(--gold-dim));background-clip:padding-box;border:2px solid transparent}
*::-webkit-scrollbar-corner{background:transparent}

/* === STAGE === */
#stage{position:fixed;inset:0;background:#000;overflow:hidden}

/* === DOORS w/ split V logo halves === */
.door{position:absolute;top:0;bottom:0;width:50%;background:linear-gradient(180deg,#0a0a0a,#000 60%,#050505);z-index:40;will-change:transform;box-shadow:inset 0 0 80px rgba(0,0,0,.6);overflow:visible}
.door.left{left:0;transform:translateX(-100%);transition:transform .95s var(--ease-h)}
.door.right{right:0;transform:translateX(100%);transition:transform .95s var(--ease-h)}
.door .grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:3px 3px;opacity:.4;pointer-events:none}
.doors-closed .door.left,.doors-closed .door.right{transform:translateX(0)}
.doors-open  .door.left{transform:translateX(-100%)}
.doors-open  .door.right{transform:translateX(100%)}

/* V logo halves — attached to inner door edges */
.logo-half{position:absolute;top:50%;width:300px;height:380px;pointer-events:none}
.logo-half svg{width:100%;height:100%;display:block;overflow:visible}
.logo-half .v-shape{fill:var(--gold);transition:filter .25s ease}
.door.left  .logo-half{right:-150px;transform:translateY(-50%)}
.door.right .logo-half{left:-150px;transform:translateY(-50%)}
.logo-half.left-half  svg{clip-path:inset(0 50% 0 0)}
.logo-half.right-half svg{clip-path:inset(0 0 0 50%)}

/* Neon burst removed per request — keep V solid gold when halves meet */
.stage.neon .logo-half .v-shape{ fill:var(--gold); }

/* Impact line (no flash) */
.impact{display:none}


/* Halves fade out before login */
.logo-half.fading{transition:opacity .55s ease, transform .55s ease;opacity:0;transform:translateY(-50%) scale(.97)}

/* === LOGIN === */
#loginScreen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:radial-gradient(1200px 700px at 50% 40%, #15140e 0%, #050505 60%, #000 100%)}
#loginScreen.show{display:flex;animation:fadeIn .55s var(--ease-s) both}
#loginScreen.hide{animation:fadeOut .45s var(--ease-s) both}
.login-card{width:min(420px,92vw);background:linear-gradient(180deg,rgba(25,25,28,.92),rgba(10,10,12,.95));border:1px solid rgba(213,166,42,.25);border-radius:18px;padding:42px 32px 28px;box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 60px rgba(213,166,42,.08);backdrop-filter:blur(8px);animation:cardIn .6s var(--ease-s) both}
@keyframes cardIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.brand .logo-mark{font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:.18em;font-size:22px;color:var(--gold);text-shadow:0 2px 18px rgba(213,166,42,.45)}
.brand .tag{font-family:'Montserrat',sans-serif;font-weight:300;font-size:11px;letter-spacing:.42em;color:#9a9a9a;text-transform:uppercase}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:8px;font-weight:500}
.field input,.field select{width:100%;background:#0a0a0c;border:1px solid var(--line);color:#fff;padding:13px 14px;border-radius:10px;font-size:14px;transition:border-color .25s,box-shadow .25s,background .25s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(213,166,42,.15);background:#0d0d10}
.gold-btn{width:100%;margin-top:6px;padding:14px;border-radius:10px;background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#0a0a0a;font-weight:700;letter-spacing:.18em;font-size:12px;text-transform:uppercase;transition:transform .15s,box-shadow .25s,filter .2s;box-shadow:0 10px 24px -10px rgba(213,166,42,.6)}
.gold-btn:hover{transform:translateY(-1px);box-shadow:0 16px 32px -10px rgba(213,166,42,.7);filter:brightness(1.05)}
.gold-btn:active{transform:translateY(0)}
.gold-btn:disabled{opacity:.6;cursor:wait}
.danger-btn{padding:11px 14px;border-radius:10px;background:rgba(255,77,79,.12);border:1px solid rgba(255,77,79,.4);color:#ffb0b1;font-weight:600;letter-spacing:.12em;font-size:12px;text-transform:uppercase;transition:all .2s}
.danger-btn:hover{background:rgba(255,77,79,.2);border-color:var(--danger);color:#fff}
.ghost-btn{padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#ddd;font-size:12px;letter-spacing:.08em;transition:all .2s}
.ghost-btn:hover{background:rgba(213,166,42,.10);border-color:rgba(213,166,42,.4);color:var(--gold)}
.row-meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12px;color:#777}
.err{margin-top:14px;padding:10px 12px;border-radius:8px;background:rgba(255,77,79,.08);border:1px solid rgba(255,77,79,.3);color:#ffb3b4;font-size:12.5px;display:none}
.err.show{display:block;animation:fadeIn .25s ease}
.hint{margin-top:14px;text-align:center;font-size:11px;color:#555;letter-spacing:.08em}

/* === VALIDATION (slow breathing V) === */
#validate{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(14px)}
#validate.show{display:flex;animation:fadeIn .35s ease both}
#validate.hide{animation:fadeOut .4s ease both}
.v-wrap{position:relative;width:300px;height:380px;display:flex;align-items:center;justify-content:center}
.v-wrap svg{width:300px;height:380px;overflow:visible}
.v-wrap .v-shape{fill:var(--gold);animation:breathV 2.6s ease-in-out infinite;transform-origin:50% 50%}
@keyframes breathV{
  0%,100%{filter:
    drop-shadow(0 0 4px var(--gold))
    drop-shadow(0 0 12px var(--gold))
    drop-shadow(0 0 26px rgba(213,166,42,.55));
    transform:scale(1)}
  50%   {filter:
    drop-shadow(0 0 10px var(--gold-soft))
    drop-shadow(0 0 24px var(--gold))
    drop-shadow(0 0 46px rgba(213,166,42,.85))
    drop-shadow(0 0 80px rgba(213,166,42,.4));
    transform:scale(1.04)}
}
.v-status{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);font-family:'Montserrat',sans-serif;font-weight:300;letter-spacing:.32em;font-size:12px;color:#ddd;text-transform:uppercase;white-space:nowrap}
.v-status .ok{color:var(--gold)}
.v-status.fading{opacity:0;transition:opacity .45s ease}
#validate.fail .v-shape{fill:var(--danger);animation-duration:1.1s}

/* === APP SHELL === */
#app{position:absolute;inset:0;background:radial-gradient(1400px 800px at 20% -10%,#1a1408 0%,#0a0a0c 45%,#050505 100%);color:#fff;display:none;flex-direction:column;z-index:10;overflow:hidden}
#app.show{display:flex}
#app::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(213,166,42,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(213,166,42,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);pointer-events:none}

.topbar{position:relative;z-index:2;display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid rgba(213,166,42,.12);background:rgba(0,0,0,.45);backdrop-filter:blur(14px)}
.topbar .logo{display:flex;align-items:center;gap:10px}
.topbar .logo .mark{font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:.16em;color:var(--gold);font-size:15px}
.topbar .logo .sep{width:1px;height:20px;background:rgba(255,255,255,.12)}
.topbar .logo .panel{font-family:'Montserrat',sans-serif;font-weight:300;letter-spacing:.32em;text-transform:uppercase;font-size:10.5px;color:#bbb}
.search{flex:1;max-width:520px;margin:0 auto;position:relative;display:none}
@media(min-width:760px){.search{display:block}}
.search input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 14px 10px 38px;border-radius:10px;font-size:13px}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.06)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#888}
.top-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);transition:all .2s;color:#ddd;position:relative}
.icon-btn:hover{background:rgba(213,166,42,.12);border-color:rgba(213,166,42,.4);color:var(--gold)}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold-soft),var(--gold));display:grid;place-items:center;color:#000;font-weight:700;font-size:13px;cursor:pointer;border:2px solid rgba(213,166,42,.4)}

.main{position:relative;z-index:2;flex:1;overflow:auto;padding:24px 18px 110px;-webkit-overflow-scrolling:touch}
@media(min-width:760px){.main{padding:36px 28px 120px}}
.view{display:none;animation:slideUp .35s var(--ease-s) both}
.view.active{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

.hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.hero h1{font-family:'Montserrat',sans-serif;font-weight:300;font-size:clamp(26px,5vw,40px);letter-spacing:-.01em;line-height:1.1}
.hero h1 b{font-weight:700;color:var(--gold)}
.hero .sub{font-size:12.5px;color:#999;margin-top:6px;letter-spacing:.04em}
.clock{font-family:'Montserrat',sans-serif;text-align:right}
.clock .t{font-size:clamp(22px,4vw,32px);font-weight:300;letter-spacing:.06em}
.clock .d{font-size:10.5px;letter-spacing:.32em;color:#888;text-transform:uppercase;margin-top:4px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.kpi{position:relative;background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;overflow:hidden;transition:transform .25s var(--ease-s),border-color .25s,box-shadow .3s}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),transparent);opacity:.7}
.kpi:hover{transform:translateY(-3px);border-color:rgba(213,166,42,.4);box-shadow:0 18px 40px -20px rgba(213,166,42,.4)}
.kpi .lbl{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:#999;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kpi .lbl .ic{width:24px;height:24px;border-radius:7px;background:rgba(213,166,42,.12);color:var(--gold);display:grid;place-items:center}
.kpi .num{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.02em}
.kpi .delta{font-size:11.5px;color:var(--ok);margin-top:4px}
.kpi .delta.down{color:#ff8e8e}

.panel{background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;margin-bottom:18px}
.panel h3{font-family:'Montserrat',sans-serif;font-size:12.5px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:#ccc;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.panel h3 .accent{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.panel h3 .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:980px){.grid-2{grid-template-columns:1.4fr 1fr}}

.carousel{position:relative}
.carousel .track{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:6px 2px 14px;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
.carousel .track::-webkit-scrollbar{height:6px}
.carousel .track::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
.carousel .card{scroll-snap-align:start;flex:0 0 280px}
.card{background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;transition:transform .25s var(--ease-s),border-color .25s,box-shadow .3s;position:relative;cursor:pointer}
.card:hover{transform:translateY(-2px);border-color:rgba(213,166,42,.35);box-shadow:0 14px 30px -16px rgba(213,166,42,.45)}
.card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.card .head .ttl{font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#ddd}
.card .head .badge{font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(213,166,42,.15);color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.card .head .badge.ok{background:rgba(122,223,138,.15);color:var(--ok)}
.card .head .badge.warn{background:rgba(245,196,81,.18);color:var(--warn)}
.card .head .badge.bad{background:rgba(255,77,79,.18);color:#ffb0b1}
.carousel .nav{display:flex;justify-content:flex-end;gap:6px;margin-top:-6px;margin-bottom:6px}
.carousel .nav button{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#bbb;display:grid;place-items:center;transition:all .2s}
.carousel .nav button:hover{background:rgba(213,166,42,.12);color:var(--gold);border-color:rgba(213,166,42,.4)}

/* People grid view */
.ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.pseudo{font-size:11px;color:var(--gold);letter-spacing:.08em;font-style:italic}

.kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed rgba(255,255,255,.07);font-size:13px;gap:10px}
.kv:last-child{border-bottom:none}
.kv .k{color:#9a9a9a;letter-spacing:.04em}
.kv .v{color:#fff;font-weight:500;font-family:'Montserrat',sans-serif;letter-spacing:.04em;text-align:right}

.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:0}

.form-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:680px){.form-grid.cols-2{grid-template-columns:1fr 1fr}.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}}
.form-grid label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:6px;display:block}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;background:#0a0a0c;border:1px solid var(--line);color:#fff;padding:12px 13px;border-radius:10px;font-size:13.5px;transition:all .2s}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(213,166,42,.15)}
.form-grid textarea{min-height:90px;resize:vertical;font-family:inherit}
.form-section{grid-column:1/-1;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-top:8px;padding-top:8px;border-top:1px dashed rgba(213,166,42,.25)}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#888;padding:10px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:500;background:rgba(0,0,0,.3);position:sticky;top:0}
.tbl td{padding:11px 10px;border-bottom:1px dashed rgba(255,255,255,.06);color:#ddd;vertical-align:middle}
.tbl tr:hover td{background:rgba(213,166,42,.04)}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.06);color:#ddd}
.pill.gold{background:rgba(213,166,42,.16);color:var(--gold)}
.pill.ok{background:rgba(122,223,138,.16);color:var(--ok)}
.pill.warn{background:rgba(245,196,81,.18);color:var(--warn)}
.pill.bad{background:rgba(255,77,79,.18);color:#ffb0b1}
.pill.info{background:rgba(122,183,255,.16);color:var(--info)}

.bottomnav{position:absolute;left:0;right:0;bottom:0;z-index:5;display:flex;align-items:stretch;background:rgba(8,8,10,.92);border-top:1px solid rgba(213,166,42,.22);backdrop-filter:blur(18px);box-shadow:0 -10px 30px rgba(0,0,0,.6);padding-bottom:env(safe-area-inset-bottom);overflow-x:auto}
.navbtn{flex:1;min-width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:11px 6px;color:#999;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;transition:all .25s;position:relative}
.navbtn svg{width:19px;height:19px;transition:transform .25s}
.navbtn:hover{color:#fff;background:rgba(255,255,255,.04)}
.navbtn:hover svg{transform:translateY(-2px)}
.navbtn.active{color:var(--gold);background:rgba(213,166,42,.10)}
.navbtn.active::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--gold);box-shadow:0 0 8px var(--gold)}

.modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:20px}
.modal.show{display:flex;animation:fadeIn .25s ease both}
.modal .box{width:min(640px,100%);max-height:88vh;overflow:auto;background:linear-gradient(180deg,#15151a,#0c0c0f);border:1px solid rgba(213,166,42,.25);border-radius:18px;padding:24px 22px;position:relative;animation:cardIn .35s var(--ease-s) both}
.modal .box:has(.emp-detail){width:min(1080px,100%);padding:14px 14px}
.modal .box:has(.emp-detail) .close{z-index:5;background:rgba(0,0,0,.65);color:#fff;border:1px solid rgba(213,166,42,.4);top:18px;right:18px}
.modal .box .close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);color:#ccc;display:grid;place-items:center;font-size:18px;line-height:1;z-index:3}
.modal .box .close:hover{background:rgba(255,77,79,.2);color:#fff}
.modal .box h2{font-family:'Montserrat',sans-serif;font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}

#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(20,20,24,.96);border:1px solid rgba(213,166,42,.4);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;letter-spacing:.04em;box-shadow:0 12px 30px rgba(0,0,0,.6);animation:cardIn .3s var(--ease-s) both;max-width:90vw}
.toast.ok{border-color:rgba(122,223,138,.45)}
.toast.bad{border-color:rgba(255,77,79,.5)}

.bigact{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.bigact button{padding:22px 14px;border-radius:16px;background:linear-gradient(160deg,rgba(213,166,42,.18),rgba(213,166,42,.04));border:1px solid rgba(213,166,42,.4);color:var(--gold);font-family:'Montserrat',sans-serif;letter-spacing:.18em;font-weight:700;font-size:13px;text-transform:uppercase;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:8px}
.bigact button:hover{transform:translateY(-2px);box-shadow:0 14px 30px -14px rgba(213,166,42,.6);border-color:var(--gold)}
.bigact button svg{width:26px;height:26px}
.bigact button.out{color:#ffb0b1;border-color:rgba(255,77,79,.4);background:linear-gradient(160deg,rgba(255,77,79,.16),rgba(255,77,79,.03))}
.bigact button.out:hover{box-shadow:0 14px 30px -14px rgba(255,77,79,.6);border-color:var(--danger)}

/* Bar/donut chart helpers */
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px;color:#bbb;margin-bottom:6px}
.bar-row .lbl{flex:0 0 110px;color:#999;letter-spacing:.04em}
.bar-row .bar{flex:1;background:rgba(255,255,255,.06);border-radius:6px;height:10px;overflow:hidden}
.bar-row .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:6px}
.bar-row .num{flex:0 0 50px;text-align:right;color:#fff;font-family:'Montserrat',sans-serif}

/* Spinner */
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* === Payroll redesigned cards (photo-bg, status pill) === */
.pay-row{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 2px 14px;scrollbar-width:thin}
.pay-row::-webkit-scrollbar{height:8px}
.pay-row::-webkit-scrollbar-thumb{background:rgba(213,166,42,.35);border-radius:4px}
.pay-card{position:relative;flex:0 0 230px;height:280px;border-radius:14px;overflow:hidden;cursor:pointer;background:#0e0e10;border:1px solid rgba(255,255,255,.06);transition:transform .25s var(--ease-s),border-color .25s,box-shadow .3s;scroll-snap-align:start}
.pay-card:hover{transform:translateY(-3px);border-color:rgba(213,166,42,.55);box-shadow:0 12px 28px rgba(0,0,0,.55),0 0 0 1px rgba(213,166,42,.25)}
.pay-card .bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:saturate(.9)}
.pay-card .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.55) 38%,rgba(0,0,0,.95) 70%,#000 100%)}
.pay-card .bg.fallback{background:linear-gradient(160deg,#2a2a30,#0e0e10)}
.pay-card .pill{position:absolute;top:10px;right:10px;z-index:3;font-size:10px;font-weight:700;letter-spacing:.14em;padding:4px 10px;border-radius:999px;text-transform:uppercase;background:rgba(122,223,138,.18);color:var(--ok);border:1px solid rgba(122,223,138,.35)}
.pay-card .pill.unpaid{background:rgba(245,196,81,.18);color:var(--warn);border-color:rgba(245,196,81,.4)}
.pay-card .pill.pill-btn{cursor:pointer;font-family:inherit;transition:transform .18s var(--ease-s),box-shadow .18s,background .18s}
.pay-card .pill.pill-btn:hover{transform:translateY(-1px) scale(1.04);box-shadow:0 4px 14px rgba(0,0,0,.45)}

/* People-Directory: pay-card grid layout */
.ppl-grid.pay-row-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ppl-grid.pay-row-grid .pay-card{flex:initial;width:100%;height:280px}
.emp-pay-card{view-transition-name:auto}

/* Split-panel employee detail modal */
@keyframes empSplitIn{0%{opacity:0;transform:scale(.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes empPanelLeftIn{0%{opacity:0;transform:translateX(-30px)}100%{opacity:1;transform:translateX(0)}}
@keyframes empPanelRightIn{0%{opacity:0;transform:translateX(30px)}100%{opacity:1;transform:translateX(0)}}
.emp-detail{display:grid;grid-template-columns:300px 1fr;gap:0;background:#0d0d10;border:1px solid rgba(213,166,42,.25);border-radius:14px;overflow:hidden;animation:empSplitIn .42s var(--ease-s) both;max-width:1080px;width:100%}
@media(max-width:780px){.emp-detail{grid-template-columns:1fr}}
.emp-detail .ed-left{position:relative;background:#0a0a0c;animation:empPanelLeftIn .55s var(--ease-s) both;display:flex;flex-direction:column;border-right:1px solid rgba(213,166,42,.18)}
.emp-detail .ed-photo{position:relative;height:240px;background-size:cover;background-position:center top}
.emp-detail .ed-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.55) 60%,#0a0a0c 100%)}
.emp-detail .ed-left .ed-meta{padding:14px 18px 18px;display:flex;flex-direction:column;gap:6px}
.emp-detail .ed-left .ed-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;line-height:1.15}
.emp-detail .ed-left .ed-pseudo{font-size:11px;color:var(--gold);letter-spacing:.18em;font-style:italic;text-transform:uppercase}
.emp-detail .ed-left .ed-id{font-size:11px;color:#888;letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.emp-detail .ed-left .ed-dept{display:inline-block;margin-top:5px;font-size:10.5px;font-weight:700;letter-spacing:.16em;padding:4px 10px;border-radius:999px;text-transform:uppercase;background:rgba(213,166,42,.15);color:var(--gold);border:1px solid rgba(213,166,42,.4);align-self:flex-start}
.emp-detail .ed-right{padding:16px 20px 18px;animation:empPanelRightIn .55s var(--ease-s) both;animation-delay:.08s}
.emp-detail .ed-right .form-grid{gap:8px}
.emp-detail .ed-right .form-grid.cols-2{grid-template-columns:1fr 1fr 1fr}
.emp-detail .ed-right .form-grid label{margin-bottom:3px;font-size:10px}
.emp-detail .ed-right .form-grid input,.emp-detail .ed-right .form-grid select{padding:7px 10px;font-size:12.5px;border-radius:8px}
.pay-card .body{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:14px 14px 12px;display:flex;flex-direction:column;gap:6px}
.pay-card .pname{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#fff;line-height:1.1}
.pay-card .ppseudo{font-size:10.5px;color:var(--gold);letter-spacing:.18em;font-style:italic;text-transform:uppercase;margin-bottom:6px}
.pay-card .prow{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;line-height:1.4;gap:8px}
.pay-card .prow .pk{color:#b9b9b9;letter-spacing:.03em}
.pay-card .prow .pv{font-family:'Montserrat',sans-serif;color:#fff;font-weight:500;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.pay-card .prow.pos .pv{color:var(--gold)}
.pay-card .prow.neg .pv{color:#ffb0b1}
.pay-card .pnet{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--gold-dim);margin-top:4px;padding-top:6px;font-family:'Montserrat',sans-serif}
.pay-card .pnet .pk{color:var(--gold);font-size:11px;letter-spacing:.18em;font-weight:700}
.pay-card .pnet .pv{color:var(--gold);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

/* === Card Lock UI === */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}
.pay-card .pay-lock{position:absolute;top:10px;left:10px;z-index:5;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(0,0,0,.55);border:1px solid rgba(213,166,42,.45);color:var(--gold);cursor:pointer;backdrop-filter:blur(6px);transition:transform .55s cubic-bezier(.6,-.2,.2,1.4),width .55s,height .55s,border-radius .5s,top .55s,left .55s,background .4s,color .4s,box-shadow .4s}
.pay-card .pay-lock svg{width:18px;height:18px;transition:width .5s,height .5s}
.pay-card .pay-lock svg .lk-shackle{transition:transform .5s var(--ease-s);transform-origin:12px 11px}
.pay-card .pay-lock:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(213,166,42,.4)}
.pay-card .pay-lock-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,0,0,.65),rgba(0,0,0,.95));z-index:4;opacity:0;pointer-events:none;transition:opacity .55s var(--ease-s)}
.pay-card.locked{cursor:not-allowed}
.pay-card.locked .body,.pay-card.locked .pill,.pay-card.locked .bg{filter:blur(2px) brightness(.4);pointer-events:none;transition:filter .55s}
.pay-card.locked .pay-lock-overlay{opacity:1}
.pay-card.locked .pay-lock{top:50%;left:50%;width:92px;height:92px;border-radius:24px;transform:translate(-50%,-50%);background:rgba(213,166,42,.16);border-color:var(--gold);box-shadow:0 0 0 6px rgba(213,166,42,.08),0 18px 50px rgba(0,0,0,.7);animation:lockPulse 2.4s ease-in-out infinite}
.pay-card.locked .pay-lock svg{width:50px;height:50px}
@keyframes lockPulse{0%,100%{box-shadow:0 0 0 6px rgba(213,166,42,.08),0 18px 50px rgba(0,0,0,.7)}50%{box-shadow:0 0 0 14px rgba(213,166,42,.04),0 18px 60px rgba(213,166,42,.28)}}

/* === Animated 3D Calendar === */
.cal3d-stage{display:flex;justify-content:center;padding:6px 2px;perspective:1400px;perspective-origin:50% 30%}
@keyframes cal3dIn{0%{opacity:0;transform:rotateX(45deg) rotateY(-20deg) translateY(40px) scale(.85)}100%{opacity:1;transform:rotateX(8deg) rotateY(0) translateY(0) scale(1)}}
@keyframes cal3dInRight{0%{opacity:0;transform:translateX(40px) rotateY(20deg)}100%{opacity:1;transform:translateX(0) rotateY(0)}}
@keyframes cal3dInLeft{0%{opacity:0;transform:translateX(-40px) rotateY(-20deg)}100%{opacity:1;transform:translateX(0) rotateY(0)}}
@keyframes cal3dCellIn{0%{opacity:0;transform:translateZ(-30px) rotateX(-30deg)}100%{opacity:1;transform:translateZ(0) rotateX(0)}}
.cal3d{width:340px;max-width:100%;background:linear-gradient(160deg,#15151a,#0a0a0c);border:1px solid rgba(213,166,42,.3);border-radius:18px;padding:16px;box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(213,166,42,.1) inset,0 60px 60px -30px rgba(213,166,42,.18);transform-style:preserve-3d;animation:cal3dIn .75s cubic-bezier(.2,.8,.2,1) both;transform:rotateX(8deg)}
.cal3d-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal3d-title{font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;font-size:13px}
.cal3d-nav{width:32px;height:32px;border-radius:10px;background:rgba(213,166,42,.1);color:var(--gold);font-size:20px;line-height:1;border:1px solid rgba(213,166,42,.3);transition:transform .25s var(--ease-s),background .25s}
.cal3d-nav:hover{transform:translateY(-1px) scale(1.06);background:rgba(213,166,42,.22)}
.cal3d-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal3d-dow span{font-size:10px;letter-spacing:.16em;text-transform:uppercase;text-align:center;color:#888;padding:4px 0}
.cal3d-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;transform-style:preserve-3d}
.cal3d-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#ddd;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid transparent;transition:transform .2s var(--ease-s),background .2s,border-color .2s,color .2s;cursor:pointer}
.cal3d-cell:hover:not(.empty):not(.disabled){transform:translateZ(8px) scale(1.1);background:rgba(213,166,42,.18);border-color:rgba(213,166,42,.5);color:#fff}
.cal3d-cell.today{color:var(--gold);border-color:rgba(213,166,42,.4)}
.cal3d-cell.sel{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#000;border-color:var(--gold);transform:translateZ(14px) scale(1.1);box-shadow:0 8px 22px rgba(213,166,42,.45)}
.cal3d-cell.empty{background:transparent;cursor:default}
.cal3d-cell.disabled{opacity:.25;cursor:not-allowed}
.cal3d-foot{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(213,166,42,.2);font-size:12px;color:#bbb;text-align:center}
.cal3d-foot b{color:var(--gold)}

/* === Reports carousel & flip cards === */
.rep-track{display:flex;gap:22px;padding:14px 24px 30px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:thin;scroll-behavior:smooth}
.rep-track::-webkit-scrollbar{height:8px}
.rep-track::-webkit-scrollbar-thumb{background:rgba(213,166,42,.4);border-radius:4px}
.rep-card{flex:0 0 280px;height:340px;perspective:1500px;scroll-snap-align:start}
.rep-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.rep-card.flippable:hover .rep-inner,.rep-card.flipped .rep-inner{transform:rotateY(180deg)}
.rep-face{position:absolute;inset:0;border-radius:18px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;background:linear-gradient(160deg,#1b1b22,#0a0a0c);border:1px solid rgba(213,166,42,.25);box-shadow:0 18px 40px rgba(0,0,0,.55)}
.rep-face::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 0%,rgba(213,166,42,.2),transparent 60%);pointer-events:none}
.rep-face .rep-icon{width:54px;height:54px;border-radius:14px;background:rgba(213,166,42,.14);display:flex;align-items:center;justify-content:center;color:var(--gold);margin-bottom:auto;border:1px solid rgba(213,166,42,.35)}
.rep-face h4{font-family:'Montserrat',sans-serif;font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:#fff;margin-top:10px}
.rep-face p{font-size:12px;color:#999;line-height:1.55;margin-top:6px}
.rep-back{transform:rotateY(180deg);background:linear-gradient(160deg,#0e0e12,#000);justify-content:center;align-items:stretch;gap:12px;padding:30px 22px}
.rep-back h5{font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:10px}
.rep-back .rep-opt{padding:14px 16px;border-radius:12px;background:rgba(213,166,42,.08);border:1px solid rgba(213,166,42,.35);color:#fff;font-weight:600;letter-spacing:.06em;text-align:center;cursor:pointer;transition:transform .25s var(--ease-s),background .25s}
.rep-back .rep-opt:hover{transform:translateY(-2px);background:rgba(213,166,42,.2)}
.rep-back select{padding:10px 12px;border-radius:10px;background:#0d0d10;border:1px solid rgba(213,166,42,.3);color:#fff;font-family:inherit;font-size:13px;width:100%}
.rep-card.coming .rep-face{opacity:.6}
.rep-card.coming .rep-face::after{content:"COMING SOON";position:absolute;top:16px;right:16px;font-size:9px;letter-spacing:.2em;background:rgba(245,196,81,.18);border:1px solid rgba(245,196,81,.4);color:var(--warn);padding:4px 8px;border-radius:999px}

/* Requests — animated category grid + request modal */
.req-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.req-type-grid .req-type-card{height:240px;opacity:0;animation:reqCardIn .55s var(--ease-s) both}
@keyframes reqCardIn{0%{opacity:0;transform:translateY(18px) scale(.94) rotateX(8deg)}100%{opacity:1;transform:translateY(0) scale(1) rotateX(0)}}
.req-type-card:hover{transform:translateY(-4px) scale(1.015);transition:transform .3s var(--ease-s)}
.modal .box:has(.req-type-modal){width:min(1200px,100%);padding:18px 18px}
.req-type-modal{display:flex;flex-direction:column;gap:14px}
.req-type-modal .rt-head{display:flex;flex-direction:column;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(213,166,42,.25);padding-bottom:14px}
.req-type-modal .rt-title{font-family:'Montserrat',sans-serif;font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.req-type-modal .rt-filters{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;width:100%;max-width:680px}
.req-type-modal .rt-filters label{display:block;font-size:10.5px;letter-spacing:.14em;color:#bbb;text-transform:uppercase;margin-bottom:4px}
.req-type-modal .rt-filters input,.req-type-modal .rt-filters select{width:100%;padding:9px 10px;border-radius:9px;background:#0d0d10;border:1px solid rgba(213,166,42,.3);color:#fff;font-family:inherit;font-size:13px}
.rt-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px}
.rt-list{display:flex;flex-direction:column;gap:10px}
.req-row{display:grid;grid-template-columns:44px 1fr auto auto;gap:14px;align-items:center;background:linear-gradient(180deg,#15151a,#0c0c0f);border:1px solid rgba(213,166,42,.2);border-radius:12px;padding:12px 14px;cursor:pointer;transition:transform .18s var(--ease-s),border-color .18s,box-shadow .18s;animation:cardIn .35s var(--ease-s) both}
.req-row:hover{transform:translateY(-1px);border-color:rgba(213,166,42,.55);box-shadow:0 6px 22px rgba(213,166,42,.08)}
.req-row .rr-photo{width:44px;height:44px;border-radius:50%;background-size:cover;background-position:center;border:1px solid rgba(213,166,42,.35);background-color:#1c1c20;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:700;color:var(--gold);font-size:13px;letter-spacing:.06em}
.req-row .rr-main{display:flex;flex-direction:column;gap:3px;min-width:0}
.req-row .rr-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;color:#fff;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-row .rr-sub{font-size:11px;color:#9a9a9a;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-row .rr-sub b{color:var(--gold);font-weight:600}
.req-row .rr-date{font-size:11px;color:#cfcfcf;text-align:right;white-space:nowrap}
.req-row .rr-status .badge{font-size:10px;padding:4px 9px}
@media (max-width:560px){.req-row{grid-template-columns:40px 1fr auto;gap:10px;padding:10px}.req-row .rr-date{display:none}}

/* Request chat modal */
.req-chat{display:flex;flex-direction:column;gap:14px;max-height:70vh}
.req-chat .rch-head{display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(213,166,42,.25);padding-bottom:12px}
.req-chat .rch-photo{width:42px;height:42px;border-radius:50%;background-size:cover;background-position:center;border:1px solid rgba(213,166,42,.35);background-color:#1c1c20;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:700;color:var(--gold);font-size:13px}
.req-chat .rch-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;color:#fff;text-transform:uppercase}
.req-chat .rch-id{font-size:10.5px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase}
.req-chat .rch-body{display:flex;flex-direction:column;gap:14px;overflow-y:auto;padding:8px 4px;min-height:160px}
.req-chat .msg{display:flex;gap:8px;max-width:80%}
.req-chat .msg.from-emp{align-self:flex-start}
.req-chat .msg.from-admin{align-self:flex-end;flex-direction:row-reverse}
.req-chat .msg .bubble{padding:11px 13px;border-radius:14px;font-size:12.5px;line-height:1.55;color:#eee;background:#1a1a1f;border:1px solid rgba(255,255,255,.06)}
.req-chat .msg.from-emp .bubble{background:#161618;border-color:rgba(213,166,42,.18);border-bottom-left-radius:4px}
.req-chat .msg.from-admin .bubble{background:linear-gradient(180deg,rgba(213,166,42,.18),rgba(213,166,42,.06));border-color:rgba(213,166,42,.35);color:#fff;border-bottom-right-radius:4px}
.req-chat .msg .bubble .bmeta{display:block;margin-top:6px;font-size:10px;color:#9a9a9a;letter-spacing:.1em;text-transform:uppercase}
.req-chat .msg .bubble .bkv{display:flex;justify-content:space-between;gap:10px;margin:2px 0;font-size:11.5px}
.req-chat .msg .bubble .bkv span:first-child{color:#9a9a9a;letter-spacing:.08em;text-transform:uppercase;font-size:10px}

<script>
/* =====================================================================
 * VECLAR HRMS — Single-file production HRMS (v3)
 * ===================================================================== */
/* ============================================================
 * BACKEND: paste your Apps Script Web App URL below.
 * Deploy → New deployment → Web app → Execute as: Me, Access: Anyone.
 * Until replaced, the app runs on in-memory demo data.
 * ============================================================ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyL6xeiWSnaOtdkOrdQW4TLxIuQQG9DQ_k-jc8XwTokcIu1ksgfldmNFOQuUBmCTQN9/exec";

const VECLAR = {
  ENDPOINT: APPS_SCRIPT_URL.indexOf('REPLACE_ME') === -1 ? APPS_SCRIPT_URL : '',
  COMPANY: 'Veclar Technologies',
  TZ: 'Asia/Karachi',
  DEPARTMENTS: ['Sales','Customer Support','Graphics','Leads','Developer','HR'],
  REQUEST_TYPES: ['Casual Leave','Sick Leave','Late Coming','Half Day','Advance Salary','Waiver Appeal','Salary Slip','Experience Letter','Bank Opening Letter','Custom Requests'],
  SHIFT: { start:'18:00', end:'03:00' }, // 06:00 PM – 03:00 AM (next day)
  PRESENT_UNTIL: '18:15',  // ≤ 18:15 = Present
  LATE_UNTIL:    '18:30',  // 18:16–18:30 = Late
  // > 18:30 = Half Day (50% deduction)
  MONTHLY_LEAVE_QUOTA: 2,  // approved leaves per month
  WORKING_DAYS:  [1,2,3,4,5], // Mon–Fri (0=Sun)
  CYCLE_START_DAY: 26, PAYDAY: 5,
  MIN_BASIC_SALARY: 80000,
  SALES_BASE_LOW: 80000,
  SALES_BASE_HIGH: 150000,
  SALES_REV_BUMP: 3001,        // ≥ $3,001 → base 150k
  SALES_COMM_T1_FROM: 3500,    // 15% on $3,500–$4,999
  SALES_COMM_T2_FROM: 5000,    // 20% on portion ≥ $5,000
  USD_TO_PKR: 280,             // editable in Settings
  HOLIDAYS: []
};
// In-memory store for payroll-time inputs (per emp, current cycle)
let PAYROLL_INPUTS = {}; // { empId: { revenueUSD, weeklyCommPKR, waivedDates, savedAt } }
try{ PAYROLL_INPUTS = JSON.parse(localStorage.getItem('veclar.payrollInputs')||'{}') || {}; }catch(e){ PAYROLL_INPUTS = {}; }
function piSave(){ try{ localStorage.setItem('veclar.payrollInputs', JSON.stringify(PAYROLL_INPUTS)); }catch(e){} }
function piFor(empId){ return PAYROLL_INPUTS[empId] || (PAYROLL_INPUTS[empId] = {revenueUSD:0, weeklyCommPKR:0, waivedDates:[], savedAt:null}); }
function piCycleKey(){
  const now = new Date();
  const cs = new Date(now.getFullYear(), now.getMonth() + (now.getDate()<VECLAR.CYCLE_START_DAY?-1:0), VECLAR.CYCLE_START_DAY);
  return `${cs.getFullYear()}-${pad(cs.getMonth()+1)}`;
}

// Persistent Paid/Unpaid status per employee per cycle

const $  = id => document.getElementById(id);
const el = (tag, attrs={}, ...kids) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='class') e.className = v;
    else if (k==='html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2),v);
    else if (v!=null) e.setAttribute(k,v);
  }
  for (const k of kids.flat()) if (k!=null) e.append(k.nodeType?k:document.createTextNode(k));
  return e;
};
const pad = n => String(n).padStart(2,'0');
const fmtTime = t => {
  if (!t) return '—';
  const d = new Date(t);
  if (isNaN(d.getTime())) return String(t);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
};
const fmtDate = t => {
  if (!t) return '—';
  const d = new Date(t);
  if (isNaN(d.getTime())) return String(t);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});
};
const fmtMoney = n => 'Rs ' + Number(n||0).toLocaleString('en-PK');
const fmtUSD = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
const todayKey = (d=new Date()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const minOf = (hh,mm)=>hh*60+mm;
const parseHM = s => { const [h,m]=String(s).split(':').map(Number); return minOf(h,m); };

function toast(msg, kind=''){
  const t = el('div',{class:'toast '+kind}, msg);
  $('toast').appendChild(t);
  setTimeout(()=>t.style.opacity='0', 3500);
  setTimeout(()=>t.remove(), 4000);
}

async function withSpinner(btn, fn){
  if (!btn) return fn();
  const old = btn.innerHTML, dis = btn.disabled;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span> Working…';
  try { return await fn(); }
  finally { btn.innerHTML = old; btn.disabled = dis; }
}

/* ---------- API layer (user-first / optimistic)
 *
 * Strategy:
 *   1) Run demoApi() synchronously against the in-memory store and return
 *      its result IMMEDIATELY so the UI updates without latency.
 *   2) In parallel, POST the same action to the Apps Script Web App.
 *   3) For READS (list*, get*, computePayroll, verifyLogin):
 *        - if a server response arrives, hydrate the local store from it
 *          and emit `data:refresh` so views can re-render silently.
 *   4) For WRITES: server runs in the background; failures are queued for
 *      retry in localStorage and a soft toast tells the user.
 * verifyLogin is awaited (so wrong creds fail loudly), everything else is
 * fire-and-forget from the UI perspective.
 * ---------- */
const SYNC_QUEUE_KEY = 'veclar.sync.queue.v1';
function _syncQueueLoad(){ try{ return JSON.parse(localStorage.getItem(SYNC_QUEUE_KEY)||'[]'); }catch(e){ return []; } }
function _syncQueueSave(arr){ try{ localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(arr.slice(-200))); }catch(e){} }
function _syncQueuePush(action, params){
  const q = _syncQueueLoad();
  q.push({action, params, ts:Date.now()});
  _syncQueueSave(q);
}
async function _serverCall(action, params){
  if (!VECLAR.ENDPOINT) throw new Error('no-endpoint');
  const body = new URLSearchParams();
  body.set('action', action);
  for (const [k,v] of Object.entries(params||{})){
    body.set(k, typeof v==='object' ? JSON.stringify(v) : String(v));
  }
  const r = await fetch(VECLAR.ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
    body: body.toString()
  });
  if (!r.ok) throw new Error('http '+r.status);
  return await r.json();
}
async function _drainSyncQueue(){
  if (!VECLAR.ENDPOINT) return;
  const q = _syncQueueLoad(); if (!q.length) return;
  const remaining = [];
  for (const item of q){
    try{ await _serverCall(item.action, item.params); }
    catch(e){ remaining.push(item); }
  }
  _syncQueueSave(remaining);
  if (remaining.length < q.length && window.VECLAR_BUS) window.VECLAR_BUS.emit('data:refresh');
}
setInterval(_drainSyncQueue, 15000);
window.addEventListener('online', _drainSyncQueue);

// Hydrate DEMO from server payload for read actions
function _mergePreserveLocal(localArr, remoteArr, key){
  // Remote is authoritative for items it knows about, but any local-only
  // items (e.g. an optimistic insert that hasn't reached the server yet)
  // must be preserved so background hydrate never wipes pending writes.
  const remoteIds = new Set(remoteArr.map(r => r && r[key]).filter(v => v != null));
  const localOnly = (localArr||[]).filter(l => l && l[key] != null && !remoteIds.has(l[key]));
  return remoteArr.concat(localOnly);
}
function _hydrateFromServer(action, data){
  if (!data) return;
  try{
    if (action==='listEmployees' && Array.isArray(data)){
      DEMO.employees = _mergePreserveLocal(DEMO.employees, data, 'empId');
    } else if (action==='listAttendance' && Array.isArray(data)){
      DEMO.attendance = _mergePreserveLocal(DEMO.attendance, data, 'id');
    } else if (action==='listRequests' && Array.isArray(data)){
      DEMO.requests = _mergePreserveLocal(DEMO.requests, data, 'id');
    }
    if (window.VECLAR_BUS) window.VECLAR_BUS.emit('data:refresh');
  }catch(e){ /* swallow */ }
}

const READ_ACTIONS = new Set(['listEmployees','listAttendance','listRequests','getEmployeeBundle','computePayroll','verifyLogin']);

async function api(action, params={}){
  // Optimistic local result first — this is what the caller sees.
  const local = await demoApi(action, params);

  if (!VECLAR.ENDPOINT){
    return local;
  }

  if (action === 'verifyLogin'){
    // Awaited: security boundary.
    try{
      const remote = await _serverCall(action, params);
      return remote && typeof remote.ok === 'boolean' ? remote : local;
    }catch(e){
      console.warn('verifyLogin server failed, using local:', e);
      return local;
    }
  }

  // Fire server call in the background.
  (async () => {
    try{
      const remote = await _serverCall(action, params);
      if (remote && remote.ok && READ_ACTIONS.has(action)){
        _hydrateFromServer(action, remote.data);
      }
    }catch(e){
      if (!READ_ACTIONS.has(action)){
        _syncQueuePush(action, params);
        try{ toast && toast('Saved locally — will sync when online','warn'); }catch(_){}
      }
    }
  })();

  return local;
}

  ];
  return { employees, attendance:[], requests:[], notices:[], departures:[] };
})();

function demoApi(action, p){
  const D = DEMO;
  const wrap = (ok, data, err) => Promise.resolve({ok, data, error:err});
  switch(action){
    case 'verifyLogin': {
      const u = (p.u||'').toLowerCase();
      const emp = D.employees.find(e => ((e.username||'').toLowerCase()===u || (e.email||'').toLowerCase()===u) && e.status!=='Old');
      if (!emp || emp.password !== p.password) return wrap(false, null, 'Invalid credentials');
      const safe = {...emp}; delete safe.password;
      return wrap(true, { role: emp.role, employee: safe });
    }
    case 'getEmployeeBundle': {
      const emp = D.employees.find(e=>e.empId===p.empId);
      if (!emp) return wrap(false, null, 'Not found');
      const att = D.attendance.filter(a=>a.empId===p.empId).sort((a,b)=>a.date<b.date?1:-1);
      const reqs = D.requests.filter(r=>r.empId===p.empId).sort((a,b)=>a.createdAt<b.createdAt?1:-1);
      return wrap(true, {employee:emp, attendance:att, requests:reqs, notices:D.notices.filter(n=>n.empId===p.empId)});
    }
    case 'listEmployees': return wrap(true, D.employees);
    case 'listAttendance': {
      if (p.date) return wrap(true, D.attendance.filter(a=>a.date===p.date));
      if (p.from && p.to) return wrap(true, D.attendance.filter(a=>a.date>=p.from && a.date<=p.to));
      return wrap(true, D.attendance);
    }
    case 'importAttendance': {
      const rows = JSON.parse(p.payload);
      let ins=0, upd=0;
      rows.forEach(r=>{
        const ex = D.attendance.find(a=>a.empId===r.empId && a.date===r.date && a.source==='zk');
        if (ex){ Object.assign(ex,r); upd++; }
        else { D.attendance.push({id:'A'+(D.attendance.length+1), source:'zk', ...r}); ins++; }
      });
      return wrap(true, {inserted:ins, updated:upd, total:rows.length});
    }
    case 'listRequests': return wrap(true, D.requests);
    case 'submitRequest': {
      const r = JSON.parse(p.payload);
      r.id = 'R'+(D.requests.length+1);
      r.status = 'Pending';
      r.createdAt = new Date().toISOString();
      D.requests.unshift(r);
      return wrap(true, r);
    }
    case 'approveRequest':
    case 'rejectRequest': {
      const r = D.requests.find(x=>x.id===p.id);
      if (!r) return wrap(false,null,'Not found');
      r.status = action==='approveRequest' ? 'Approved' : 'Rejected';
      r.remarks = p.remarks || '';
      return wrap(true, r);
    }
    case 'quoteRequest': {
      const r = D.requests.find(x=>x.id===p.id);
      if (!r) return wrap(false,null,'Not found');
      r.status = 'Quoted';
      r.remarks = p.remarks || '';
      return wrap(true, r);
    }
    case 'clockIn':
    case 'clockOut': {
      const day = todayKey();
      let rec = D.attendance.find(a=>a.empId===p.empId && a.date===day);
      const now = new Date().toISOString();
      if (action==='clockIn'){
        if (rec) rec.checkIn = now;
        else D.attendance.unshift({id:'A'+(D.attendance.length+1), empId:p.empId, date:day, checkIn:now, checkOut:null, source:'manual'});
      } else {
        if (rec) rec.checkOut = now;
        else D.attendance.unshift({id:'A'+(D.attendance.length+1), empId:p.empId, date:day, checkIn:null, checkOut:now, source:'manual'});
      }
      return wrap(true, {date:day});
    }
    case 'upsertEmployee': {
      const e = JSON.parse(p.payload);
      const i = D.employees.findIndex(x=>x.empId===e.empId);
      if (i>=0) Object.assign(D.employees[i], e); else { e.empId = e.empId || ('V'+pad(D.employees.length+1)); D.employees.push(e); }
      return wrap(true, e);
    }
    case 'departEmployee': {
      const e = D.employees.find(x=>x.empId===p.empId);
      if (!e) return wrap(false,null,'Not found');
      e.status = 'Old';
      e.departureType = p.type;
      e.departureDate = p.date;
      e.departureNote = p.note||'';
      D.departures.push({empId:e.empId, type:p.type, date:p.date, note:p.note||'', at:new Date().toISOString()});
      return wrap(true, e);
    }
    case 'computePayroll': {
      const emp = D.employees.find(e=>e.empId===p.empId);
      if (!emp) return wrap(false,null,'Not found');
      const pi = piFor(emp.empId);
      const opts = {
        revenueUSD: p.revenueUSD!=null ? Number(p.revenueUSD) : pi.revenueUSD,
        weeklyCommPKR: p.weeklyCommPKR!=null ? Number(p.weeklyCommPKR) : pi.weeklyCommPKR,
        advanceAmount: p.advanceAmount!=null ? Number(p.advanceAmount) : (pi.advanceAmount||0),
        otherDeductions: p.otherDeductions!=null ? Number(p.otherDeductions) : (pi.otherDeductions||0),
        waivedDates: pi.waivedDates || [],
        cycleKey: p.cycleKey || null
      };
      return wrap(true, computePayrollFor(emp, D, opts));
    }
    case 'issueNotice': {
      D.notices.push({id:'N'+(D.notices.length+1), empId:p.empId, reason:p.reason, at:new Date().toISOString()});
      return wrap(true, true);
    }
    default: return wrap(false, null, 'Unknown action: '+action);
  }
}

/* ---------- attendance status engine ---------- */
function attendanceStatus(rec, employee){
  if (!rec) return {label:'Absent', cls:'bad', code:'A'};
  if (rec.leaveStatus==='Approved') return {label:'Leave (Paid)', cls:'ok', code:'LP'};
  if (rec.leaveStatus==='Pending')  return {label:'Leave (Pending)', cls:'warn', code:'LX'};
  if (rec.leaveStatus==='Rejected') return {label:'Leave (Unpaid)', cls:'bad', code:'LU'};
  if (!rec.checkIn) return {label:'Absent', cls:'bad', code:'A'};
  const d = new Date(rec.checkIn);
  const t = d.getHours()*60+d.getMinutes();
  const present = parseHM(VECLAR.PRESENT_UNTIL);
  const late    = parseHM(VECLAR.LATE_UNTIL);
  if (t <= present) return {label:'Present', cls:'ok', code:'P'};
  if (t <= late)    return {label:'Late', cls:'warn', code:'L'};
  return {label:'Half Day', cls:'warn', code:'H'};
}

function isSales(emp){ return emp && emp.dept==='Sales'; }
function isSalesLead(emp){ return isSales(emp) && /lead|head|manager/i.test(emp.title||''); }

/* ---------- Payroll engine ---------- */
function computePayrollFor(emp, D, opts){
  opts = opts || {};
  const revenue = Number(opts.revenueUSD!=null ? opts.revenueUSD : (emp.revenueMTD||0));
  const weeklyCommPKR = Number(opts.weeklyCommPKR||0);
  const waived = new Set(opts.waivedDates||[]);
  const usdRate = Number(VECLAR.USD_TO_PKR||0);

  // Build attendance for current cycle (CYCLE_START_DAY → next month CYCLE_START_DAY-1)
  const now = new Date();
  let cycleStart;
  if (opts.cycleKey){
    const [yy,mm] = opts.cycleKey.split('-').map(Number);
    cycleStart = new Date(yy, mm-1, VECLAR.CYCLE_START_DAY);
  } else {
    cycleStart = new Date(now.getFullYear(), now.getMonth() + (now.getDate()<VECLAR.CYCLE_START_DAY?-1:0), VECLAR.CYCLE_START_DAY);
  }
  const cycleEnd = new Date(cycleStart); cycleEnd.setMonth(cycleEnd.getMonth()+1); cycleEnd.setDate(cycleEnd.getDate()-1);
  const att = D.attendance.filter(a=>a.empId===emp.empId && a.date>=todayKey(cycleStart) && a.date<=todayKey(cycleEnd));
  const reqs = D.requests.filter(r=>r.empId===emp.empId && (r.type||'').includes('Leave') && r.date>=todayKey(cycleStart) && r.date<=todayKey(cycleEnd));

  let workingDays = 0;
  for (let d=new Date(cycleStart); d<=cycleEnd; d.setDate(d.getDate()+1))
    if (VECLAR.WORKING_DAYS.includes(d.getDay())) workingDays++;

  let lates=0, halfDays=0, present=0, paidLeaves=0, unpaidLeaves=0, absents=0;
  let waivedHalfDays=0, waivedLates=0;
  const days = {};
  att.forEach(a=>{ days[a.date]=a; });
  reqs.forEach(r=>{
    const day = days[r.date] || (days[r.date]={empId:emp.empId, date:r.date});
    day.leaveStatus = r.status;
  });
  for (let d=new Date(cycleStart); d<=cycleEnd; d.setDate(d.getDate()+1)){
    if (!VECLAR.WORKING_DAYS.includes(d.getDay())) continue;
    if (d > now) continue;
    const k = todayKey(d);
    const rec = days[k];
    const st = attendanceStatus(rec, emp);
    const isWaived = waived.has(k);
    if (st.code==='P') present++;
    else if (st.code==='L'){ lates++; present++; if(isWaived) waivedLates++; }
    else if (st.code==='H'){ halfDays++; present++; if(isWaived) waivedHalfDays++; }
    else if (st.code==='LP'){ paidLeaves++; }
    else if (st.code==='LU'||st.code==='LX'){ unpaidLeaves++; }
    else absents++;
  }

  // Sales base bump
  let basic = isSales(emp)
    ? Math.max(VECLAR.MIN_BASIC_SALARY, emp.basicSalary || VECLAR.MIN_BASIC_SALARY)
    : Number(emp.basicSalary || 0);
  let salesCommUSD = 0, basicNote = '';
  if (isSales(emp) && !isSalesLead(emp)){
    if (revenue >= VECLAR.SALES_REV_BUMP){
      basic = Math.max(basic, VECLAR.SALES_BASE_HIGH);
      basicNote = `Bumped to ${fmtMoney(VECLAR.SALES_BASE_HIGH)} (revenue ≥ $${VECLAR.SALES_REV_BUMP})`;
    } else {
      basic = Math.max(basic, VECLAR.SALES_BASE_LOW);
      basicNote = `Base ${fmtMoney(VECLAR.SALES_BASE_LOW)} (revenue < $${VECLAR.SALES_REV_BUMP})`;
    }
    if (revenue >= VECLAR.SALES_COMM_T1_FROM){
      salesCommUSD += Math.max(0, Math.min(revenue, VECLAR.SALES_COMM_T2_FROM) - VECLAR.SALES_COMM_T1_FROM) * 0.15;
    }
    if (revenue >= VECLAR.SALES_COMM_T2_FROM){
      salesCommUSD += (revenue - VECLAR.SALES_COMM_T2_FROM) * 0.20;
    }
  }
  const salesCommPKR = Math.round(salesCommUSD * usdRate);

  const daily = workingDays>0 ? basic/workingDays : 0;
  let halfDed = Math.max(0, halfDays - waivedHalfDays) * 0.5 * daily;
  let absDed  = (absents + unpaidLeaves) * daily;
  const lateDed = 0;

  let quotaUsed = 0, extraUnpaid = 0;
  Object.values(days).filter(x=>x.leaveStatus==='Approved').sort((a,b)=>a.date<b.date?-1:1).forEach(x=>{
    if (quotaUsed < VECLAR.MONTHLY_LEAVE_QUOTA) quotaUsed++; else extraUnpaid++;
  });
  let quotaDed = extraUnpaid * daily;

  // Rule: if Sales revenue ≥ $3,500, no attendance-based deductions
  let attendanceWaivedByRevenue = false;
  if (isSales(emp) && revenue >= 3500){
    halfDed = 0; absDed = 0; quotaDed = 0;
    attendanceWaivedByRevenue = true;
  }

  const advanceAmount = Number(opts.advanceAmount||0);
  const otherDeductions = Number(opts.otherDeductions||0);

  const net = basic - lateDed - halfDed - absDed - quotaDed + salesCommPKR + weeklyCommPKR - advanceAmount - otherDeductions;
  return {
    empId:emp.empId, basic, basicNote, daily:Math.round(daily), workingDays,
    present, lates, halfDays, paidLeaves, unpaidLeaves, absents,
    waivedHalfDays, waivedLates,
    halfDed:Math.round(halfDed), absDed:Math.round(absDed), quotaDed:Math.round(quotaDed),
    revenue, salesCommUSD: Math.round(salesCommUSD*100)/100, salesCommPKR,
    weeklyCommPKR: Math.round(weeklyCommPKR), usdRate,
    extraUnpaid, leaveQuota: VECLAR.MONTHLY_LEAVE_QUOTA, quotaUsed,
    cycleStart: todayKey(cycleStart), cycleEnd: todayKey(cycleEnd),
    advanceAmount: Math.round(advanceAmount), otherDeductions: Math.round(otherDeductions),
    attendanceWaivedByRevenue,
    net: Math.round(net)
  };
}

function buildNav(role){
  const nav = $('bottomnav');
  nav.innerHTML = '';
  const items = NAV[role] || NAV.employee;
  items.forEach((it, i) => {
    const b = el('button', {class:'navbtn'+(i===0?' active':''), 'data-tab':it.id,
      onclick:()=>switchView(it.id)});
    b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${it.icon}</svg>${it.label}`;
    nav.appendChild(b);
  });
  $('panelName').textContent = role==='admin' ? 'Admin Control' : 'Employee Portal';
}

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  const v = $('view-'+id);
  if (v){ v.classList.add('active'); }
  RENDERERS[id] && RENDERERS[id]();
}

function carousel(items, renderCard){
  const wrap = el('div',{class:'carousel'});
  const nav = el('div',{class:'nav'});
  const prev = el('button',{title:'Prev'},'‹');
  const next = el('button',{title:'Next'},'›');
  const track = el('div',{class:'track'});
  items.forEach(it=>{ const c = renderCard(it); c.classList.add('card'); track.appendChild(c); });
  if (!items.length) track.appendChild(el('div',{class:'card'}, el('div',{class:'kv'}, el('span',{class:'k'},'No data yet.'))));
  prev.addEventListener('click',()=>track.scrollBy({left:-300,behavior:'smooth'}));
  next.addEventListener('click',()=>track.scrollBy({left:300,behavior:'smooth'}));
  nav.append(prev,next);
  wrap.append(nav, track);
  return wrap;
}

// Initials-based SVG avatar (admin configures real photos when adding employees).
window._empInitials = function(name){
  const parts = String(name||'').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  const a = parts[0][0]||'';
  const b = parts.length>1 ? parts[parts.length-1][0] : '';
  return (a+b).toUpperCase();
};
window._empPhoto = function(emp, idx){
  if (emp && emp.photo) return emp.photo;

};

        <div class="prow"><span class="pk">Title</span><span class="pv" style="font-weight:400;text-transform:none;letter-spacing:.02em">${e.title||'—'}</span></div>
        <div class="prow"><span class="pk">Contact</span><span class="pv" style="font-weight:400">${e.phone||'—'}</span></div>
        <div class="prow"><span class="pk">Joined</span><span class="pv">${fmtDate(e.joinDate)}</span></div>
        <div class="pnet"><span class="pk">SALARY</span><span class="pv">${fmtMoney(e.basicSalary)}</span></div>
      </div>`});
  }

  function render(){
    const dq = $('fDept').value, sq = ($('fSearch').value||'').toLowerCase(), st=$('fStatus').value;
    const list = allEmps.filter(e =>
      (!dq||e.dept===dq) &&
      (!st || (st==='Active'? e.status!=='Old' : e.status==='Old')) &&
      (!sq || (`${e.name} ${e.pseudoName||''} ${e.email||''} ${e.phone||''}`).toLowerCase().includes(sq))
    );
    grid.innerHTML = `<h3><span class="accent"></span>${list.length} ${st==='Old'?'old ':''}employees · ${PEOPLE_VIEW.toUpperCase()} view</h3>`;
    if (PEOPLE_VIEW==='table'){
      const t = el('div',{class:'scroll-x'});
      t.innerHTML = `<table class="tbl"><thead><tr><th>ID</th><th>Name</th><th>Pseudo</th><th>Dept</th><th>Title</th><th>Contact</th><th>Salary</th><th>Status</th></tr></thead><tbody>${
        list.map(e=>`<tr onclick='openEmployeeDetailModal(${JSON.stringify(e).replace(/'/g,"&apos;")})' style="cursor:pointer">
          <td>${e.empId}</td><td>${e.name}</td><td>${e.pseudoName||'—'}</td><td>${e.dept}</td><td>${e.title||'—'}</td>
          <td>${e.phone||'—'}</td><td>${fmtMoney(e.basicSalary)}</td>
          <td><span class="pill ${e.status==='Old'?'bad':'ok'}">${e.status||'Active'}</span></td></tr>`).join('')
      }</tbody></table>`;
      grid.appendChild(t);
    } else if (PEOPLE_VIEW==='grid'){
      const g = el('div',{class:'ppl-grid pay-row-grid'});
      list.forEach((e,i)=>g.appendChild(empCard(e,i)));
      grid.appendChild(g);
    } else {
      grid.appendChild(carousel(list, empCard));
    }
  }
  $('fDept').addEventListener('change',render);
  $('fSearch').addEventListener('input',render);
  $('fStatus').addEventListener('change',render);
  render();
};

/* ---- Admin: Attendance (comprehensive) ---- */
RENDERERS['admin-attendance'] = async function(){
  const v = $('view-admin-attendance'); v.innerHTML='';
  v.innerHTML = `<div class="hero"><div><h1>Attendance <b>Overview</b></h1>
    <div class="sub">ZKTeco K50 import · Shift ${VECLAR.SHIFT.start}–${VECLAR.SHIFT.end} · Mon–Fri working</div></div></div>`;

  // Controls
  const ctl = el('div',{class:'panel'});
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  ctl.innerHTML = `<h3><span class="accent"></span>Period
    <span class="actions">
      <label class="ghost-btn" style="cursor:pointer">Import .xls
        <input id="zkFile" type="file" accept=".xls,.xlsx" style="display:none"/></label>
      <button class="ghost-btn" id="exCsv">Export CSV</button>
    </span></h3>
    <div class="form-grid cols-3">
      <div><label>From</label><input type="date" id="aFrom" value="${todayKey(monthStart)}"/></div>
      <div><label>To</label><input type="date" id="aTo" value="${todayKey(today)}"/></div>
      <div><label>Department</label><select id="aDeptF"><option value="">All</option>${VECLAR.DEPARTMENTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
    </div>`;
  v.appendChild(ctl);

  // Stat cards
  const kpis = el('div',{class:'kpis', id:'attKpis'});
  v.appendChild(kpis);

  // Two-col: status chart + late-by-day chart
  const grid = el('div',{class:'grid-2'});
  const statusPanel = el('div',{class:'panel'});
  statusPanel.innerHTML = `<h3><span class="accent"></span>Status Breakdown</h3><div id="statusChart"></div>`;
  const trendPanel = el('div',{class:'panel'});
  trendPanel.innerHTML = `<h3><span class="accent"></span>Daily Presence</h3><div id="trendChart" style="display:flex;gap:4px;align-items:flex-end;height:140px"></div>`;
  grid.append(statusPanel, trendPanel);
  v.appendChild(grid);

  // Records table
  const tablePanel = el('div',{class:'panel'});
  tablePanel.innerHTML = `<h3><span class="accent"></span>Records</h3>
    <div class="scroll-x"><table class="tbl" id="aTbl"><thead><tr>
      <th>Date</th><th>Employee</th><th>Dept</th><th>Check In</th><th>Check Out</th><th>Status</th><th>Source</th><th>Leave</th><th>Action</th>
    </tr></thead><tbody></tbody></table></div>`;
  v.appendChild(tablePanel);

  async function load(){
    const from=$('aFrom').value, to=$('aTo').value, dept=$('aDeptF').value;
    const emps = (await api('listEmployees',{})).data||[];
    const att = (await api('listAttendance',{from, to})).data||[];
    const reqs = (await api('listRequests',{})).data||[];

    // Index leave requests by emp+date
    const lvIdx = {};
    reqs.filter(r=>(r.type||'').includes('Leave')).forEach(r=>{ lvIdx[r.empId+'|'+r.date]=r; });

    // Annotate
    const enriched = att.map(a=>{
      const lv = lvIdx[a.empId+'|'+a.date];
      return {...a, leaveStatus: lv?lv.status:undefined, leaveType: lv?lv.type:undefined, leaveId: lv?lv.id:undefined};
    });

    const filt = enriched.filter(a=>{ const e=emps.find(x=>x.empId===a.empId); return e && (!dept||e.dept===dept); });

    // KPIs
    let p=0,l=0,h=0,lp=0,lu=0,a0=0;
    filt.forEach(rec=>{
      const e=emps.find(x=>x.empId===rec.empId);
      const st=attendanceStatus(rec,e);
      if(st.code==='P')p++; else if(st.code==='L')l++; else if(st.code==='H')h++;
      else if(st.code==='LP')lp++; else if(st.code==='LU'||st.code==='LX')lu++; else a0++;
    });
    kpis.innerHTML='';
    [
      {l:'Records', n:filt.length, d:`${from} → ${to}`},
      {l:'Present', n:p, d:'On time'},
      {l:'Late', n:l, d:`After ${VECLAR.PRESENT_UNTIL}`, down:l>0},
      {l:'Half Day', n:h, d:`After ${VECLAR.LATE_UNTIL}`, down:h>0},
      {l:'Paid Leaves', n:lp, d:'Approved'},
      {l:'Unpaid / Pending', n:lu, d:'Leaves', down:lu>0}
    ].forEach(k=>{
      const c=el('div',{class:'kpi'});
      c.innerHTML=`<div class="lbl"><span class="ic">●</span>${k.l}</div><div class="num">${k.n}</div><div class="delta ${k.down?'down':''}">${k.d}</div>`;
      kpis.appendChild(c);
    });

    // Status chart
    const sc = $('statusChart'); sc.innerHTML='';
    const total = Math.max(1, p+l+h+lp+lu+a0);
    [['Present',p,'ok'],['Late',l,'warn'],['Half Day',h,'warn'],['Paid Leave',lp,'info'],['Unpaid Leave',lu,'bad'],['Absent',a0,'bad']].forEach(([lbl,n,cl])=>{
      const row = el('div',{class:'bar-row'});
      row.innerHTML = `<span class="lbl">${lbl}</span><div class="bar"><span style="width:${n/total*100}%;background:${cl==='ok'?'linear-gradient(90deg,#7adf8a,#4cc46a)':cl==='warn'?'linear-gradient(90deg,#f5c451,#d99a1a)':cl==='info'?'linear-gradient(90deg,#7ab7ff,#3a7bd8)':'linear-gradient(90deg,#ff8e8e,#d44b4b)'}"></span></div><span class="num">${n}</span>`;
      sc.appendChild(row);
    });

    // Trend by date
    const tc = $('trendChart'); tc.innerHTML='';
    const byDay = {};
    filt.forEach(r=>{ byDay[r.date]=(byDay[r.date]||0)+1; });
    const dayKeys = Object.keys(byDay).sort();
    const maxN = Math.max(1,...Object.values(byDay));
    dayKeys.slice(-30).forEach(d=>{
      const h=byDay[d]/maxN*100;
      const bar=el('div',{title:`${d}: ${byDay[d]}`,style:`flex:1;min-width:6px;height:${h}%;background:linear-gradient(180deg,var(--gold-soft),var(--gold-dim));border-radius:3px 3px 0 0`});
      tc.appendChild(bar);
    });
    if (!dayKeys.length) tc.innerHTML = '<span style="color:#666;font-size:12px">No data</span>';

    // Table
    const tb = $('aTbl').querySelector('tbody'); tb.innerHTML='';
    filt.sort((a,b)=>a.date<b.date?1:-1).slice(0,300).forEach(rec=>{
      const e=emps.find(x=>x.empId===rec.empId);
      const st=attendanceStatus(rec,e);
      let leaveCell = '—';
      if (rec.leaveStatus){
        if (rec.leaveStatus==='Pending'){
          leaveCell = `<span class="pill warn">Pending</span> <button class="ghost-btn" data-id="${rec.leaveId}" data-act="approve" style="padding:4px 8px;font-size:10px">Approve</button> <button class="ghost-btn" data-id="${rec.leaveId}" data-act="reject" style="padding:4px 8px;font-size:10px">Reject</button>`;
        } else {
          leaveCell = `<span class="pill ${rec.leaveStatus==='Approved'?'ok':'bad'}">${rec.leaveType||'Leave'} · ${rec.leaveStatus}</span>`;
        }
      }
      const pi = piFor(rec.empId);
      const isWaivable = (st.code==='L' || st.code==='H');
      const isWaived = pi.waivedDates && pi.waivedDates.indexOf(rec.date)>=0;
      let actionCell = '—';
      if (isWaivable){
        actionCell = isWaived
          ? `<span class="pill ok">Waived</span> <button class="ghost-btn" data-emp="${rec.empId}" data-date="${rec.date}" data-act="unwaive" style="padding:4px 8px;font-size:10px">Undo</button>`
          : `<button class="ghost-btn" data-emp="${rec.empId}" data-date="${rec.date}" data-act="waive" style="padding:4px 8px;font-size:10px;border-color:var(--gold);color:var(--gold)">Waive</button>`;
      }
      const tr = el('tr',{},
        el('td',{}, fmtDate(rec.date)),
        el('td',{}, e?e.name:rec.empId),
        el('td',{}, e?e.dept:'—'),
        el('td',{}, fmtTime(rec.checkIn)),
        el('td',{}, fmtTime(rec.checkOut)),
        el('td',{html:`<span class="pill ${st.cls==='ok'?'ok':st.cls==='warn'?'warn':'bad'}">${st.label}${isWaived?' · Waived':''}</span>`}),
        el('td',{}, rec.source==='zk'?'ZKTeco':'Manual'),
        el('td',{html:leaveCell}),
        el('td',{html:actionCell})
      );
      tb.appendChild(tr);
    });
    tb.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click', async ev=>{
      ev.stopPropagation();
      const act=b.dataset.act;
      if (act==='waive' || act==='unwaive'){
        const pi = piFor(b.dataset.emp);
        const d = b.dataset.date;
        if (act==='waive'){ if (pi.waivedDates.indexOf(d)<0) pi.waivedDates.push(d); toast('Deductions waived — payroll updated','ok'); }
        else { pi.waivedDates = pi.waivedDates.filter(x=>x!==d); toast('Waiver removed — payroll updated','ok'); }
        piSave();
        if (window.__refreshPayroll) window.__refreshPayroll();
        load();
        return;
      }
      await withSpinner(b, async ()=>{
        const id=b.dataset.id;
        const remarks = act==='approve'?'Approved from attendance':'Rejected from attendance';
        const r = await api(act==='approve'?'approveRequest':'rejectRequest',{id, remarks});
        if (r.ok){ toast(act==='approve'?'Leave approved (Paid)':'Leave rejected (Unpaid)','ok'); load(); }
        else toast('Failed','bad');
      });
    }));

    // Export CSV
    $('exCsv').onclick = ()=>{
      const rows = [['Date','Employee','Dept','Check In','Check Out','Status','Source','Leave']];
      filt.forEach(rec=>{
        const e=emps.find(x=>x.empId===rec.empId);
        const st=attendanceStatus(rec,e);
        rows.push([rec.date, e?e.name:rec.empId, e?e.dept:'', fmtTime(rec.checkIn), fmtTime(rec.checkOut), st.label, rec.source||'manual', rec.leaveStatus||'']);
      });
      const csv = rows.map(r=>r.map(x=>`"${(x==null?'':String(x)).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv],{type:'text/csv'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`attendance-${from}_${to}.csv`; a.click();
    };
  }

  // ZKTeco import
  $('zkFile').addEventListener('change', async ev=>{
    const file = ev.target.files[0]; if (!file) return;
    const lbl = ev.target.parentElement;
    const old = lbl.innerHTML;
    lbl.innerHTML = '<span class="btn-spinner"></span> Parsing…';
    try{
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, {cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:true});
      const emps = (await api('listEmployees',{})).data||[];
      const empByZk = {}; emps.forEach(e=>{ if (e.zkEmpId) empByZk[String(e.zkEmpId).trim()] = e.empId; });
      // Build pairs by emp+shiftDate (shift 18:00–03:00 next day; in/out belong to same shift starting that evening)
      const pairs = {}; // key: empId|shiftDate
      let unmapped = 0;
      rows.forEach(r=>{
        const zk = String(r['EMP ID']||r['Emp ID']||r['EmpId']||'').trim();
        if (!zk) return;
        const empId = empByZk[zk];
        if (!empId){ unmapped++; return; }
        const dateRaw = r['Date'], timeRaw = r['Time'];
        const dt = parseZkDateTime(dateRaw, timeRaw);
        if (!dt) return;
        const state = String(r['State']||'').toLowerCase();
        // Shift-date: any timestamp before 14:00 belongs to previous evening's shift
        const shiftDate = new Date(dt);
        if (dt.getHours() < 14) shiftDate.setDate(shiftDate.getDate()-1);
        const sd = todayKey(shiftDate);
        const key = empId+'|'+sd;
        const slot = pairs[key] = pairs[key] || {empId, date:sd, checkIn:null, checkOut:null};
        if (state.includes('in')){
          if (!slot.checkIn || new Date(slot.checkIn) > dt) slot.checkIn = dt.toISOString();
        } else if (state.includes('out')){
          if (!slot.checkOut || new Date(slot.checkOut) < dt) slot.checkOut = dt.toISOString();
        } else {
          // unknown state → treat first as in, later as out
          if (!slot.checkIn) slot.checkIn = dt.toISOString();
          else slot.checkOut = dt.toISOString();
        }
      });
      const list = Object.values(pairs);
      const r = await api('importAttendance',{payload:JSON.stringify(list)});
      if (r.ok){ toast(`Imported ${r.data.total} records · ${unmapped} unmapped (set ZK Emp ID on profile)`,'ok'); load(); }
      else toast('Import failed','bad');
    }catch(err){
      console.error(err); toast('Could not parse file','bad');
    }
    lbl.innerHTML = old;
    // re-bind input
    $('zkFile').value='';
  });

  $('aFrom').addEventListener('change',load);
  $('aTo').addEventListener('change',load);
  $('aDeptF').addEventListener('change',load);
  load();
};

function parseZkDateTime(dateRaw, timeRaw){
  // Date can be: 'DD-MM-YYYY' string, Date object, or Excel-decoded Date
  let y, mo, d;
  if (dateRaw instanceof Date && !isNaN(dateRaw)){
    y = dateRaw.getFullYear(); mo = dateRaw.getMonth(); d = dateRaw.getDate();
  } else if (typeof dateRaw === 'string'){
    const m = dateRaw.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
    if (!m) return null;
    d = +m[1]; mo = +m[2]-1; y = +m[3]; if (y<100) y+=2000;
  } else return null;
  // Time: time object {hours,minutes,seconds} or string 'HH:MM:SS' or Date
  let hh=0, mm=0, ss=0;
  if (timeRaw instanceof Date && !isNaN(timeRaw)){
    hh=timeRaw.getHours(); mm=timeRaw.getMinutes(); ss=timeRaw.getSeconds();
  } else if (typeof timeRaw === 'string'){
    const t = timeRaw.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?/);
    if (t){ hh=+t[1]; mm=+t[2]; ss=+(t[3]||0); }
  } else if (timeRaw && typeof timeRaw === 'object' && 'hours' in timeRaw){
    hh=timeRaw.hours||0; mm=timeRaw.minutes||0; ss=timeRaw.seconds||0;
  }
  return new Date(y, mo, d, hh, mm, ss);
}
